<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SF Scope Creator v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--accent:#c8542a;--steel:#2d3748;--bg:#f7f8fa;--white:#fff;--border:#e2e8f0;--muted:#718096;--slate:#4a5568;--ink:#1a1a1a;--blue:#2b6cb0;--amber:#b7791f;--green:#276749}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
body{display:flex;flex-direction:column}

/* Header */
.hdr{flex-shrink:0;background:var(--steel);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.hdr h1{font-size:16px;font-weight:700}.hdr h1 em{color:#f6a86a;font-style:normal}
.hdr-right{display:flex;align-items:center;gap:6px;font-size:12px;color:#a0aec0}
.hdr-right input{width:46px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:5px;color:#fff;font-size:13px;font-weight:700;padding:3px 5px;text-align:center;outline:none}
.badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:2px 8px;margin-left:6px}

/* Tab panes */
.pane{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:none;min-height:0}
.pane.on{display:block}

/* Tab bar */
.tabs{flex-shrink:0;background:#fff;border-top:1px solid var(--border);display:flex}
.tab{flex:1;border:none;background:none;padding:10px 4px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab svg{width:21px;height:21px;stroke-width:1.8;fill:none;stroke:currentColor}
.tab.on{color:var(--accent)}

/* Search */
.search-box{display:flex;align-items:center;background:#fff;border:1px solid var(--border);border-radius:10px;padding:0 12px;gap:8px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.search-box input{border:none;background:transparent;font-size:15px;padding:11px 0;width:100%;outline:none;font-family:inherit}

/* Section cards */
.sec-card{background:#fff;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.08);overflow:hidden}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none}
.sec-hdr-left{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;color:var(--steel)}
.sec-bdg{background:var(--accent);color:#fff;font-size:11px;font-weight:700;border-radius:9px;padding:1px 7px;display:none}
.sec-bdg.on{display:inline}
.chevron{color:var(--muted);font-size:11px;transition:transform .2s}
.sec-card.open .chevron{transform:rotate(90deg)}
.sec-body{display:none;border-top:1px solid var(--border)}
.sec-card.open .sec-body{display:block}
.room-srch{padding:9px 12px 7px;display:flex;align-items:center;gap:8px;background:#fafbfc;border-bottom:1px solid var(--border)}
.room-srch input{flex:1;border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-size:13px;outline:none;font-family:inherit;background:#fff}
.room-srch input:focus{border-color:var(--accent)}
.no-match{padding:8px 16px;font-size:12px;color:var(--muted);font-style:italic;display:none}
.task-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:12px}
.task-row:last-child{border-bottom:none}
.task-row:active{background:#fdf0eb}
.task-row.sel{background:#fdf0eb}
.task-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
.task-row label{font-size:14px;color:var(--slate);flex:1;cursor:pointer;line-height:1.4}
.task-row.sel label{color:var(--ink);font-weight:600}

/* Summary */
.sum-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sum-card{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 2px 6px rgba(0,0,0,.07)}
.sum-card.full{grid-column:1/-1}
.sum-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.sum-val{font-size:21px;font-weight:700;font-variant-numeric:tabular-nums}
.blue{color:var(--blue)}.amber{color:var(--amber)}.green{color:var(--green)}

/* Job detail cards */
.job-card{background:#fff;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.07);overflow:hidden;border-left:4px solid var(--accent)}
.job-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 15px;cursor:pointer}
.job-title{font-size:14px;font-weight:700;color:var(--ink)}
.job-sub{font-size:11px;color:var(--muted);margin-top:2px}
.job-cost{text-align:right;flex-shrink:0;margin-left:10px}
.job-total{font-size:14px;font-weight:700;color:var(--blue)}
.job-cost-sub{font-size:10px;color:var(--muted);margin-top:1px}
.job-body{display:none;border-top:1px solid var(--border);padding:13px 15px}
.job-card.open .job-body{display:block}

.frow{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.frow label{font-size:12px;font-weight:600;color:var(--slate)}
.finput{border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-size:14px;font-family:inherit;width:88px;text-align:right;outline:none;background:#fff}
.finput:focus{border-color:var(--accent)}
.finput.ov{border-color:var(--amber);color:var(--amber);font-weight:600}
.mrow{display:flex;align-items:center;gap:5px}
.munit{font-size:12px;color:var(--muted)}
.reset-lnk{font-size:11px;color:var(--amber);text-decoration:underline;cursor:pointer;margin-left:6px}
.flbl{font-size:12px;font-weight:600;color:var(--slate);margin:10px 0 4px;display:block}
.notes-ta{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px 11px;font-size:14px;font-family:inherit;resize:none;height:75px;outline:none;color:var(--ink)}
.notes-ta:focus{border-color:var(--accent)}

/* Photos */
.photo-grid{display:flex;flex-wrap:wrap;gap:7px;margin:7px 0}
.photo-thumb{position:relative;width:78px;height:78px;border-radius:7px;overflow:hidden;border:1px solid var(--border)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-btns{display:flex;gap:8px;margin-top:5px}
.photo-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:9px;border:1.5px dashed var(--border);background:var(--bg);color:var(--slate);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.photo-btn input{display:none}

/* Materials */
.mat-list{list-style:none;margin:5px 0 9px}
.mat-list li{font-size:13px;color:var(--slate);padding:2px 0;display:flex;gap:6px}
.mat-list li::before{content:"·";color:var(--accent);font-weight:700;flex-shrink:0}
.mat-edit-wrap{display:none;background:var(--bg);border-radius:7px;padding:9px;margin-top:5px}
.mat-edit-wrap.on{display:block}
.mat-ta{width:100%;border:1px solid var(--border);border-radius:7px;padding:7px 9px;font-size:13px;font-family:inherit;resize:none;height:88px;outline:none;color:var(--ink)}
.mat-ta:focus{border-color:var(--accent)}
.mat-acts{display:flex;gap:7px;margin-top:7px}
.btn-sv{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-cn{background:var(--border);color:var(--slate);border:none;border-radius:7px;padding:7px 13px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-rs{background:none;color:var(--amber);border:none;font-size:11px;cursor:pointer;font-family:inherit;text-decoration:underline;margin-left:auto;padding:0}

/* Export */
.prop-form{background:#fff;border-radius:10px;padding:15px;box-shadow:0 2px 6px rgba(0,0,0,.07);margin-bottom:12px}
.pf{margin-bottom:13px}
.pf label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);display:block;margin-bottom:4px}
.pf input,.pf textarea{width:100%;border:1px solid var(--border);border-radius:7px;padding:10px 12px;font-size:15px;font-family:inherit;outline:none;color:var(--ink);background:#fff}
.pf input:focus,.pf textarea:focus{border-color:var(--accent)}
.exp-btn{width:100%;padding:15px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:11px}
.exp-print{background:var(--steel);color:#fff}
.exp-clear{background:#fff5f5;color:#c53030;border:1px solid #fed7d7}
.sec-ttl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:14px 0 7px;display:flex;align-items:center;gap:8px}
.sec-ttl::after{content:'';flex:1;height:1px;background:var(--border)}

@media print{
  .tabs,.hdr{display:none!important}
  html,body{display:block;height:auto;overflow:visible}
  .pane{display:block!important;overflow:visible;padding:0}
  .job-body{display:block!important}
  .mat-edit-wrap,.photo-btns,.photo-rm{display:none!important}
  .finput,.notes-ta{border:none;background:transparent}
}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>

<div class="hdr">
  <h1>Stone <em>Fortress</em> — Scope <span style="font-size:11px;font-weight:400;opacity:.6">v3</span></h1>
  <div class="hdr-right">
    $<input id="rateIn" type="number" min="1" step="1" value="30" oninput="setRate(this.value)">/hr
    <span class="badge" id="totalBadge">0</span>
  </div>
</div>

<div class="pane on" id="pScope">
  <div class="search-box">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" placeholder="Search all rooms…" oninput="globalSearch(this.value)">
  </div>
  <div id="scopeList"></div>
</div>

<div class="pane" id="pSum">
  <div id="sumContent"></div>
</div>

<div class="pane" id="pExp">
  <div class="prop-form">
    <div class="pf"><label>Property Address</label><input type="text" id="xAddr" placeholder="123 Main St"></div>
    <div class="pf"><label>Prepared By</label><input type="text" id="xPrep" placeholder="Name"></div>
    <div class="pf"><label>Date</label><input type="date" id="xDate"></div>
    <div class="pf"><label>Notes</label><textarea id="xNotes" rows="3" placeholder="Additional notes…"></textarea></div>
  </div>
  <button class="exp-btn exp-print" onclick="window.print()">&#9113; Print / Save PDF</button>
  <button class="exp-btn exp-clear" onclick="clearAll()">&#128465; Clear All Jobs</button>
  <div id="expList"></div>
</div>

<div class="tabs">
  <button class="tab on" id="tScope" onclick="goTab('Scope')">
    <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
    Scope
  </button>
  <button class="tab" id="tSum" onclick="goTab('Sum')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
    Summary
  </button>
  <button class="tab" id="tExp" onclick="goTab('Exp')">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Export
  </button>
</div>

function nk(s){ return s.toLowerCase().replace(/\/co\/?/g,'/co').trim(); }
function bg(t){ return BG[nk(t)] || {m:0,h:0}; }
function mr(t){ return MR[nk(t)] || null; }
function qt(t){ return QT[nk(t)] || null; }
function effH(j){
  if(j.hrsOv !== undefined && j.hrsOv !== null) return j.hrsOv;
  var r = mr(j.task);
  var raw = r ? r.h * (j.meas||0) : bg(j.task).h;
  return Math.max(0.5, raw);
}
function effM(j){
  var r = mr(j.task);
  return r ? r.m * (j.meas||0) : bg(j.task).m;
}
function effMats(j){

function buildScope(){
  var list = document.getElementById('scopeList');
  list.innerHTML = '';
  SECTIONS.forEach(function(sec){
    var card = document.createElement('div');
    card.className = 'sec-card';
    card.id = 'sc-' + sec.n;

    var hdr = document.createElement('div');
    hdr.className = 'sec-hdr';
    hdr.innerHTML = '<div class="sec-hdr-left"><span>' + sec.i + '</span><span>' + sec.n + '</span><span class="sec-bdg" id="sb-' + sec.n + '">0</span></div><span class="chevron">&#9654;</span>';
    hdr.addEventListener('click', function(){ card.classList.toggle('open'); });

    var body = document.createElement('div');
    body.className = 'sec-body';

    var sr = document.createElement('div');
    sr.className = 'room-srch';
    var si = document.createElement('input');
    si.type = 'text';
    si.placeholder = 'Filter ' + sec.n + '…';
    var nm = document.createElement('div');
    nm.className = 'no-match';
    nm.id = 'nm-' + sec.n;
    nm.textContent = 'No matching jobs';
    si.addEventListener('click', function(e){ e.stopPropagation(); });
    si.addEventListener('input', function(){
      var q = si.value.toLowerCase();
      var any = false;
      card.querySelectorAll('.task-row').forEach(function(r){
        var show = !q || r.getAttribute('data-task').toLowerCase().indexOf(q) !== -1;
        r.style.display = show ? '' : 'none';
        if(show) any = true;
      });
      nm.style.display = (!any && q) ? 'block' : 'none';
    });
    sr.appendChild(si);
    body.appendChild(sr);
    body.appendChild(nm);

    var seen = {};
    sec.t.forEach(function(task){
      if(seen[task]) return; seen[task] = true;
      var key = jKey(sec.n, task);
      var row = document.createElement('div');
      row.className = 'task-row';
      row.setAttribute('data-task', task);
      row.id = 'tr-' + key;
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = 'cb-' + key;
      if(jobs[key]) { cb.checked = true; row.classList.add('sel'); }
      cb.addEventListener('change', function(){ toggleJob(sec.n, task, cb, row); });
      var lbl = document.createElement('label');
      lbl.htmlFor = 'cb-' + key;
      lbl.textContent = task;
      row.appendChild(cb);
      row.appendChild(lbl);
      body.appendChild(row);
    });

    card.appendChild(hdr);
    card.appendChild(body);
    list.appendChild(card);
  });
}

function globalSearch(q){
  var lq = q.toLowerCase();
  SECTIONS.forEach(function(sec){
    var card = document.getElementById('sc-' + sec.n);
    if(!card) return;
    var any = false;
    card.querySelectorAll('.task-row').forEach(function(r){
      var show = !q || r.getAttribute('data-task').toLowerCase().indexOf(lq) !== -1;
      r.style.display = show ? '' : 'none';
      if(show) any = true;
    });
    card.style.display = any ? '' : 'none';
    if(q && any) card.classList.add('open');
    if(!q) card.style.display = '';
  });
}

  if(bdg){
    var c = 0;
    Object.keys(jobs).forEach(function(k){ if(jobs[k].section === section) c++; });
    bdg.textContent = c;
    bdg.className = c > 0 ? 'sec-bdg on' : 'sec-bdg';
  }
  updateBadge();
}

function clearAll(){
  if(!confirm('Clear all selected jobs?')) return;
  jobs = {};
  buildScope();
  updateBadge();
  renderSum();
  renderExp();
}

// ── Summary tab ───────────────────────────────────────────────────────────────
function renderSum(){
  var el = document.getElementById('sumContent');
  el.innerHTML = '';
  var keys = Object.keys(jobs);
  if(keys.length === 0){
    el.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--muted)"><div style="font-size:40px;opacity:.3">📋</div><div style="font-size:16px;font-weight:600;margin-top:10px;color:var(--slate)">No jobs selected yet</div><div style="font-size:13px;margin-top:6px">Go to the Scope tab to add jobs.</div></div>';
    return;
  }
  var tM=0, tH=0;
  keys.forEach(function(k){ var j=jobs[k]; tM+=effM(j)*j.qty; tH+=effH(j)*j.qty; });
  var tL=tH*RATE, tC=tM+tL;

  var sc = document.createElement('div'); sc.className='sum-cards';
  sc.innerHTML='<div class="sum-card full"><div class="sum-lbl">Total Budget</div><div class="sum-val blue">'+fmt$(tC)+'</div></div>'
    +'<div class="sum-card"><div class="sum-lbl">Materials</div><div class="sum-val amber">'+fmt$(tM)+'</div></div>'
    +'<div class="sum-card"><div class="sum-lbl">Labor ('+tH.toFixed(2)+'h)</div><div class="sum-val green">'+fmt$(tL)+'</div></div>';
  el.appendChild(sc);

  // Group by section
  var bySec = {};
  keys.forEach(function(k){ var j=jobs[k]; if(!bySec[j.section]) bySec[j.section]=[]; bySec[j.section].push(k); });

  Object.keys(bySec).forEach(function(sec){
    var lbl = document.createElement('div'); lbl.className='sec-ttl'; lbl.textContent=sec;
    el.appendChild(lbl);
    bySec[sec].forEach(function(key){
      var j = jobs[key];
      var h=effH(j)*j.qty, m=effM(j)*j.qty, l=h*RATE, tot=m+l;
      var mtype=qt(j.task), isM=!!mtype;

      var card=document.createElement('div'); card.className='job-card';

      // Header
      var hdr=document.createElement('div'); hdr.className='job-hdr';
      hdr.innerHTML='<div><div class="job-title">'+j.task+'</div><div class="job-sub">'+sec+'</div></div>'
        +'<div class="job-cost"><div class="job-total">'+fmt$(tot)+'</div><div class="job-cost-sub">'+h.toFixed(2)+'h &middot; '+fmt$(m)+' mat</div></div>';
      hdr.addEventListener('click', function(){ card.classList.toggle('open'); });

      var body=document.createElement('div'); body.className='job-body';

      // Qty / Measurement
      var frow=document.createElement('div'); frow.className='frow';
      var lbl2=document.createElement('label'); lbl2.textContent=isM?(mtype==='sqft'?'Square Feet':'Linear Feet'):'Quantity';
      frow.appendChild(lbl2);
      if(isM){
        var mrow=document.createElement('div'); mrow.className='mrow';
        var mi=document.createElement('input'); mi.type='number'; mi.min='0'; mi.step='1'; mi.className='finput'; mi.value=j.meas||0;
        mi.addEventListener('change', function(){ jobs[key].meas=parseFloat(mi.value)||0; renderSum(); });
        var mu=document.createElement('span'); mu.className='munit'; mu.textContent=mtype==='sqft'?'sq ft':'ln ft';
        mrow.appendChild(mi); mrow.appendChild(mu); frow.appendChild(mrow);
      } else {
        var qw=document.createElement('div'); qw.style.cssText='display:flex;align-items:center;gap:8px';
        var qm=document.createElement('button'); qm.textContent='-'; qm.style.cssText='width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:var(--bg);font-size:18px;cursor:pointer';
        var qv=document.createElement('span'); qv.textContent=j.qty; qv.style.cssText='min-width:28px;text-align:center;font-weight:700';
        var qp=document.createElement('button'); qp.textContent='+'; qp.style.cssText='width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:var(--bg);font-size:18px;cursor:pointer';
        qm.addEventListener('click', function(){ if(jobs[key].qty>1){jobs[key].qty--; renderSum();} });
        qp.addEventListener('click', function(){ jobs[key].qty++; renderSum(); });
        qw.appendChild(qm); qw.appendChild(qv); qw.appendChild(qp); frow.appendChild(qw);
      }
      body.appendChild(frow);

      // Hours
      var hrow=document.createElement('div'); hrow.className='frow';
      var hlbl=document.createElement('label'); hlbl.textContent='Est. Hours'+(j.hrsOv!==null?' (custom)':'');
      hrow.appendChild(hlbl);
      var hw=document.createElement('div'); hw.style.cssText='display:flex;align-items:center;gap:5px';
      var hi=document.createElement('input'); hi.type='number'; hi.min='0'; hi.step='0.25'; hi.value=h.toFixed(2);
      hi.className='finput'+(j.hrsOv!==null?' ov':'');
      hi.addEventListener('change', function(){ jobs[key].hrsOv=parseFloat(hi.value)||0; renderSum(); });
      hw.appendChild(hi);
      if(j.hrsOv!==null){
        var rl=document.createElement('span'); rl.className='reset-lnk'; rl.textContent='Reset';
        rl.addEventListener('click', function(){ jobs[key].hrsOv=null; renderSum(); });
        hw.appendChild(rl);
      }
      hrow.appendChild(hw); body.appendChild(hrow);

      // Notes
      var nl=document.createElement('span'); nl.className='flbl'; nl.textContent='Notes';
      var nta=document.createElement('textarea'); nta.className='notes-ta'; nta.placeholder='Job notes…'; nta.value=j.notes||'';
      nta.addEventListener('input', function(){ jobs[key].notes=nta.value; });
      body.appendChild(nl); body.appendChild(nta);

      // Materials
      var ml=document.createElement('span'); ml.className='flbl'; ml.textContent='Materials'+(j.matsOv?(' (custom)'):'');
      body.appendChild(ml);
      var mats=effMats(j);
      var ul=document.createElement('ul'); ul.className='mat-list';
      if(mats.length===0){ var li=document.createElement('li'); li.style.fontStyle='italic'; li.style.color='var(--muted)'; li.textContent='None listed'; ul.appendChild(li); }
      else { mats.forEach(function(m){ var li=document.createElement('li'); li.textContent=m; ul.appendChild(li); }); }
      body.appendChild(ul);

      var eb=document.createElement('button'); eb.style.cssText='width:100%;background:none;border:1px solid var(--border);border-radius:7px;padding:7px 12px;font-size:12px;font-family:inherit;color:var(--slate);cursor:pointer;text-align:center;margin-bottom:2px';
      eb.textContent='✎ Edit materials';
      var ea=document.createElement('div'); ea.className='mat-edit-wrap';
      var eta=document.createElement('textarea'); eta.className='mat-ta'; eta.value=mats.join('\n'); eta.placeholder='One material per line…';
      var acts=document.createElement('div'); acts.className='mat-acts';
      var sv=document.createElement('button'); sv.className='btn-sv'; sv.textContent='Save';
      var cn=document.createElement('button'); cn.className='btn-cn'; cn.textContent='Cancel';
      var rs=document.createElement('button'); rs.className='btn-rs'; rs.textContent='Reset to default';
      acts.appendChild(sv); acts.appendChild(cn); acts.appendChild(rs);
      ea.appendChild(eta); ea.appendChild(acts);
      eb.addEventListener('click', function(){ ea.classList.toggle('on'); });
      cn.addEventListener('click', function(){ ea.classList.remove('on'); });
      sv.addEventListener('click', function(){ jobs[key].matsOv=eta.value.split('\n').map(function(s){return s.trim();}).filter(Boolean); renderSum(); });
      rs.addEventListener('click', function(){ jobs[key].matsOv=null; renderSum(); });
      body.appendChild(eb); body.appendChild(ea);

      // Photos
      var pl=document.createElement('span'); pl.className='flbl'; pl.textContent='Photos';
      body.appendChild(pl);
      var pg=document.createElement('div'); pg.className='photo-grid';
      (j.photos||[]).forEach(function(src,idx){
        var wrap=document.createElement('div'); wrap.className='photo-thumb';
        var img=document.createElement('img'); img.src=src;
        var rm=document.createElement('button'); rm.className='photo-rm'; rm.textContent='x';
        rm.addEventListener('click', function(){ jobs[key].photos.splice(idx,1); renderSum(); });
        wrap.appendChild(img); wrap.appendChild(rm); pg.appendChild(wrap);
      });
      body.appendChild(pg);

      var pbtns=document.createElement('div'); pbtns.className='photo-btns';
      var camlbl=document.createElement('label'); camlbl.className='photo-btn';
      camlbl.innerHTML='📷 Camera';
      var cfi=document.createElement('input'); cfi.type='file'; cfi.accept='image/*'; cfi.setAttribute('capture','environment');
      cfi.addEventListener('change', function(e){
        Array.from(e.target.files).forEach(function(file){
          var r=new FileReader(); r.onload=function(ev){ jobs[key].photos.push(ev.target.result); renderSum(); }; r.readAsDataURL(file);
        });
      });
      camlbl.appendChild(cfi); pbtns.appendChild(camlbl);

      var gallbl=document.createElement('label'); gallbl.className='photo-btn';
      gallbl.innerHTML='🖼 Gallery';
      var gfi=document.createElement('input'); gfi.type='file'; gfi.accept='image/*'; gfi.multiple=true;
      gfi.addEventListener('change', function(e){
        Array.from(e.target.files).forEach(function(file){
          var r=new FileReader(); r.onload=function(ev){ jobs[key].photos.push(ev.target.result); renderSum(); }; r.readAsDataURL(file);
        });
      });
      gallbl.appendChild(gfi); pbtns.appendChild(gallbl);
      body.appendChild(pbtns);

      card.appendChild(hdr); card.appendChild(body); el.appendChild(card);
    });
  });
}

// ── Export tab ────────────────────────────────────────────────────────────────
function renderExp(){
  var el=document.getElementById('expList'); el.innerHTML='';
  var keys=Object.keys(jobs); if(keys.length===0) return;
  var tM=0,tH=0;
  keys.forEach(function(k){ var j=jobs[k]; tM+=effM(j)*j.qty; tH+=effH(j)*j.qty; });
  var tL=tH*RATE,tC=tM+tL;
  var sc=document.createElement('div'); sc.className='sum-cards';
  sc.innerHTML='<div class="sum-card full"><div class="sum-lbl">Total</div><div class="sum-val blue">'+fmt$(tC)+'</div></div>'
    +'<div class="sum-card"><div class="sum-lbl">Materials</div><div class="sum-val amber">'+fmt$(tM)+'</div></div>'
    +'<div class="sum-card"><div class="sum-lbl">Labor</div><div class="sum-val green">'+fmt$(tL)+'</div></div>';
  el.appendChild(sc);
  var lbl=document.createElement('div'); lbl.className='sec-ttl'; lbl.textContent=keys.length+' Selected Jobs'; el.appendChild(lbl);
  keys.forEach(function(key){
    var j=jobs[key]; var h=effH(j)*j.qty,m=effM(j)*j.qty,l=h*RATE,tot=m+l;
    var row=document.createElement('div'); row.style.cssText='background:#fff;border-radius:8px;padding:11px 13px;margin-bottom:7px;box-shadow:0 2px 5px rgba(0,0,0,.07);display:flex;align-items:center;justify-content:space-between';
    row.innerHTML='<div><div style="font-size:13px;font-weight:600">'+j.task+'</div><div style="font-size:11px;color:var(--muted)">'+j.section+'</div></div>'
      +'<div style="text-align:right"><div style="font-size:14px;font-weight:700;color:var(--blue)">'+fmt$(tot)+'</div><div style="font-size:10px;color:var(--muted)">'+h.toFixed(2)+'h &middot; '+fmt$(m)+' mat</div></div>';
    el.appendChild(row);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
try { document.getElementById('xDate').value=new Date().toISOString().slice(0,10); } catch(e){}
buildScope();
</script>
</body>
</html>
