<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SF Scope Creator v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--accent:#c8542a;--steel:#2d3748;--bg:#f7f8fa;--white:#fff;--border:#e2e8f0;--muted:#718096;--slate:#4a5568;--ink:#1a1a1a;--blue:#2b6cb0;--amber:#b7791f;--green:#276749}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
body{display:flex;flex-direction:column}

/* Header */
.hdr{flex-shrink:0;background:var(--steel);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.hdr h1{font-size:16px;font-weight:700}.hdr h1 em{color:#f6a86a;font-style:normal}
.hdr-right{display:flex;align-items:center;gap:6px;font-size:12px;color:#a0aec0}
.hdr-right input{width:46px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:5px;color:#fff;font-size:13px;font-weight:700;padding:3px 5px;text-align:center;outline:none}
.badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:2px 8px;margin-left:6px}

/* Tab panes */
.pane{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:none;min-height:0}
.pane.on{display:block}

/* Tab bar */
.tabs{flex-shrink:0;background:#fff;border-top:1px solid var(--border);display:flex}
.tab{flex:1;border:none;background:none;padding:10px 4px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab svg{width:21px;height:21px;stroke-width:1.8;fill:none;stroke:currentColor}
.tab.on{color:var(--accent)}

/* Search */
.search-box{display:flex;align-items:center;background:#fff;border:1px solid var(--border);border-radius:10px;padding:0 12px;gap:8px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.search-box input{border:none;background:transparent;font-size:15px;padding:11px 0;width:100%;outline:none;font-family:inherit}

/* Section cards */
.sec-card{background:#fff;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.08);overflow:hidden}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none}
.sec-hdr-left{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;color:var(--steel)}
.sec-bdg{background:var(--accent);color:#fff;font-size:11px;font-weight:700;border-radius:9px;padding:1px 7px;display:none}
.sec-bdg.on{display:inline}
.chevron{color:var(--muted);font-size:11px;transition:transform .2s}
.sec-card.open .chevron{transform:rotate(90deg)}
.sec-body{display:none;border-top:1px solid var(--border)}
.sec-card.open .sec-body{display:block}
.room-srch{padding:9px 12px 7px;display:flex;align-items:center;gap:8px;background:#fafbfc;border-bottom:1px solid var(--border)}
.room-srch input{flex:1;border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-size:13px;outline:none;font-family:inherit;background:#fff}
.room-srch input:focus{border-color:var(--accent)}
.no-match{padding:8px 16px;font-size:12px;color:var(--muted);font-style:italic;display:none}
.task-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:12px}
.task-row:last-child{border-bottom:none}
.task-row:active{background:#fdf0eb}
.task-row.sel{background:#fdf0eb}
.task-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
.task-row label{font-size:14px;color:var(--slate);flex:1;cursor:pointer;line-height:1.4}
.task-row.sel label{color:var(--ink);font-weight:600}

/* Summary */
.sum-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sum-card{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 2px 6px rgba(0,0,0,.07)}
.sum-card.full{grid-column:1/-1}
.sum-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.sum-val{font-size:21px;font-weight:700;font-variant-numeric:tabular-nums}
.blue{color:var(--blue)}.amber{color:var(--amber)}.green{color:var(--green)}

/* Job detail cards */
.job-card{background:#fff;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.07);overflow:hidden;border-left:4px solid var(--accent)}
.job-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 15px;cursor:pointer}
.job-title{font-size:14px;font-weight:700;color:var(--ink)}
.job-sub{font-size:11px;color:var(--muted);margin-top:2px}
.job-cost{text-align:right;flex-shrink:0;margin-left:10px}
.job-total{font-size:14px;font-weight:700;color:var(--blue)}
.job-cost-sub{font-size:10px;color:var(--muted);margin-top:1px}
.job-body{display:none;border-top:1px solid var(--border);padding:13px 15px}
.job-card.open .job-body{display:block}

.frow{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.frow label{font-size:12px;font-weight:600;color:var(--slate)}
.finput{border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-size:14px;font-family:inherit;width:88px;text-align:right;outline:none;background:#fff}
.finput:focus{border-color:var(--accent)}
.finput.ov{border-color:var(--amber);color:var(--amber);font-weight:600}
.mrow{display:flex;align-items:center;gap:5px}
.munit{font-size:12px;color:var(--muted)}
.reset-lnk{font-size:11px;color:var(--amber);text-decoration:underline;cursor:pointer;margin-left:6px}
.flbl{font-size:12px;font-weight:600;color:var(--slate);margin:10px 0 4px;display:block}
.notes-ta{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px 11px;font-size:14px;font-family:inherit;resize:none;height:75px;outline:none;color:var(--ink)}
.notes-ta:focus{border-color:var(--accent)}

/* Photos */
.photo-grid{display:flex;flex-wrap:wrap;gap:7px;margin:7px 0}
.photo-thumb{position:relative;width:78px;height:78px;border-radius:7px;overflow:hidden;border:1px solid var(--border)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-btns{display:flex;gap:8px;margin-top:5px}
.photo-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:9px;border:1.5px dashed var(--border);background:var(--bg);color:var(--slate);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.photo-btn input{display:none}

/* Materials */
.mat-list{list-style:none;margin:5px 0 9px}
.mat-list li{font-size:13px;color:var(--slate);padding:2px 0;display:flex;gap:6px}
.mat-list li::before{content:"·";color:var(--accent);font-weight:700;flex-shrink:0}
.mat-edit-wrap{display:none;background:var(--bg);border-radius:7px;padding:9px;margin-top:5px}
.mat-edit-wrap.on{display:block}
.mat-ta{width:100%;border:1px solid var(--border);border-radius:7px;padding:7px 9px;font-size:13px;font-family:inherit;resize:none;height:88px;outline:none;color:var(--ink)}
.mat-ta:focus{border-color:var(--accent)}
.mat-acts{display:flex;gap:7px;margin-top:7px}
.btn-sv{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-cn{background:var(--border);color:var(--slate);border:none;border-radius:7px;padding:7px 13px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-rs{background:none;color:var(--amber);border:none;font-size:11px;cursor:pointer;font-family:inherit;text-decoration:underline;margin-left:auto;padding:0}

/* Export */
.prop-form{background:#fff;border-radius:10px;padding:15px;box-shadow:0 2px 6px rgba(0,0,0,.07);margin-bottom:12px}
.pf{margin-bottom:13px}
.pf label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);display:block;margin-bottom:4px}
.pf input,.pf textarea{width:100%;border:1px solid var(--border);border-radius:7px;padding:10px 12px;font-size:15px;font-family:inherit;outline:none;color:var(--ink);background:#fff}
.pf input:focus,.pf textarea:focus{border-color:var(--accent)}
.exp-btn{width:100%;padding:15px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:11px}
.exp-print{background:var(--steel);color:#fff}
.exp-clear{background:#fff5f5;color:#c53030;border:1px solid #fed7d7}
.sec-ttl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:14px 0 7px;display:flex;align-items:center;gap:8px}
.sec-ttl::after{content:'';flex:1;height:1px;background:var(--border)}


/* ── Property selector modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.on{display:flex}
.modal{background:var(--wh);border-radius:18px 18px 0 0;width:100%;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 env(safe-area-inset-bottom)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 12px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--wh);z-index:1}
.modal-title{font-size:17px;font-weight:700;color:var(--ink)}
.modal-close{background:none;border:none;font-size:24px;color:var(--muted);cursor:pointer;padding:0;line-height:1}
.modal-body{padding:16px}
.prop-item{display:flex;align-items:center;background:var(--bg);border-radius:10px;padding:13px 14px;margin-bottom:8px;cursor:pointer;border:2px solid transparent;gap:10px}
.prop-item.active{border-color:var(--acc);background:#fdf0eb}
.prop-item-info{flex:1;min-width:0}
.prop-item-name{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prop-item-meta{font-size:11px;color:var(--muted);margin-top:2px}
.prop-item-del{background:none;border:none;color:#c53030;font-size:20px;cursor:pointer;padding:0 0 0 8px;flex-shrink:0;line-height:1}
.new-prop-form{background:var(--bg);border-radius:10px;padding:14px;margin-top:4px}
.new-prop-form input{width:100%;border:1px solid var(--bdr);border-radius:7px;padding:10px 12px;font-size:15px;font-family:inherit;outline:none;color:var(--ink);background:var(--wh);margin-bottom:8px}
.new-prop-form input:focus{border-color:var(--acc)}
.addr-suggestions{background:var(--wh);border:1px solid var(--bdr);border-radius:7px;margin-top:-4px;margin-bottom:8px;display:none;overflow:hidden}
.addr-sug-item{padding:10px 12px;font-size:14px;color:var(--ink);cursor:pointer;border-bottom:1px solid var(--bdr)}
.addr-sug-item:last-child{border-bottom:none}
.addr-sug-item:active{background:var(--bg)}
.btn-full{width:100%;padding:12px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
.btn-create{background:var(--acc);color:#fff}
.btn-cancel-sm{background:var(--bg);color:var(--slate);border:1px solid var(--bdr)}

/* ── Header scope name ── */
.hdr-scope{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.hdr-scope-btn{display:flex;flex-direction:column;cursor:pointer;min-width:0}
.hdr-scope-btn:active{opacity:.8}

/* ── Share/Email button in export ── */
.share-section{background:var(--wh);border-radius:var(--r);padding:15px;box-shadow:var(--shadow);margin-bottom:12px}
.share-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:10px;display:block}
.share-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.share-btn{padding:12px 8px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.share-native{background:#007aff;color:#fff}
.share-email{background:#34c759;color:#fff}

@media print{
  /* Hide everything except the dedicated print container */
  body > *{ display:none!important }
  #printView{ display:block!important }
  #printView{
    font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
    font-size:11pt;
    color:#000;
    background:#fff;
    padding:0.4in;
  }
  .pv-header{ margin-bottom:18pt; border-bottom:2pt solid #000; padding-bottom:10pt }
  .pv-co{ font-size:8pt; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#555 }
  .pv-title{ font-size:18pt; font-weight:700; margin:4pt 0 2pt }
  .pv-meta{ font-size:9pt; color:#444 }
  .pv-totals{ display:flex; gap:24pt; margin-bottom:16pt; padding:8pt 10pt; border:1pt solid #ccc; background:#f8f8f8 }
  .pv-total-item{ flex:1 }
  .pv-total-lbl{ font-size:7pt; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#777 }
  .pv-total-val{ font-size:14pt; font-weight:700; margin-top:2pt }
  .pv-blue{ color:#1a56a0 }
  .pv-amber{ color:#8a5c00 }
  .pv-green{ color:#1a6b3a }
  .pv-section{ font-size:8pt; font-weight:700; text-transform:uppercase; letter-spacing:.07em;
    color:#fff; background:#2d3748; padding:4pt 8pt; margin:14pt 0 0; page-break-after:avoid }
  .pv-job{ border:1pt solid #ddd; margin:4pt 0; page-break-inside:avoid }
  .pv-job-hdr{ display:flex; justify-content:space-between; align-items:flex-start;
    padding:6pt 8pt; border-bottom:1pt solid #eee; background:#fafafa }
  .pv-job-name{ font-size:10pt; font-weight:700 }
  .pv-job-room{ font-size:8pt; color:#666; margin-top:1pt }
  .pv-job-costs{ text-align:right; flex-shrink:0; margin-left:12pt }
  .pv-job-total{ font-size:10pt; font-weight:700; color:#1a56a0 }
  .pv-job-sub{ font-size:8pt; color:#666; margin-top:1pt }
  .pv-job-body{ padding:6pt 8pt }
  .pv-mats-lbl{ font-size:7.5pt; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#777; margin-bottom:3pt }
  .pv-mat{ font-size:8.5pt; color:#333; padding:1pt 0 1pt 10pt; position:relative }
  .pv-mat::before{ content:'•'; position:absolute; left:2pt; color:#c8542a }
  .pv-footer{ margin-top:20pt; padding-top:8pt; border-top:1pt solid #ccc;
    font-size:8pt; color:#888; text-align:center }
}
@media screen{
  #printView{ display:none }
}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>

<div class="hdr">
  <div onclick="openPropModal()" style="cursor:pointer">
    <h1>Stone <em>Fortress</em> — Scope <span style="font-size:11px;font-weight:400;opacity:.6">v8</span></h1>
    <div id="hdrScopeName" style="font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Tap to select property</div>
  </div>
  <div class="hdr-right">
    $<input id="rateIn" type="number" min="1" step="1" value="30" oninput="setRate(this.value)">/hr
    <span class="badge" id="totalBadge">0</span>
  </div>
</div>

<div class="pane on" id="pScope">
  <div class="search-box">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" placeholder="Search all rooms…" oninput="globalSearch(this.value)">
  </div>
  <div id="scopeList"></div>
</div>

<div class="pane" id="pSum">
  <div id="sumContent"></div>
</div>

<div class="pane" id="pExp">
  <div class="prop-form">
    <div class="pf"><label>Property Address</label><input type="text" id="xAddr" placeholder="123 Main St"></div>
    <div class="pf"><label>Prepared By</label><input type="text" id="xPrep" placeholder="Name"></div>
    <div class="pf"><label>Date</label><input type="date" id="xDate"></div>
    <div class="pf"><label>Notes</label><textarea id="xNotes" rows="3" placeholder="Additional notes…"></textarea></div>
  </div>
  <button class="exp-btn exp-print" onclick="smartPrint()">&#9113; Print / Save PDF</button>
  <button class="exp-btn exp-clear" onclick="clearAll()">&#128465; Clear All Jobs</button>
  <div id="expList"></div>
</div>

<div class="tabs">
  <button class="tab on" id="tScope" onclick="goTab('Scope')">
    <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
    Scope
  </button>
  <button class="tab" id="tSum" onclick="goTab('Sum')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
    Summary
  </button>
  <button class="tab" id="tExp" onclick="goTab('Exp')">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Export
  </button>
</div>

<script>
var RATE = 30;
var jobs = {}; // key -> {section,task,qty,meas,hrsOv,matsOv,notes,photos}

function setRate(v){ var r=parseFloat(v); if(r>0){ RATE=r; renderSum(); renderExp(); } }
function jKey(s,t){ return s+'||'+t; }
function fmt$(n){ return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function goTab(t){
  var alreadyOn = document.getElementById('p'+t).classList.contains('on');
  ['Scope','Sum','Exp'].forEach(function(x){
    document.getElementById('p'+x).classList.remove('on');
    document.getElementById('t'+x).classList.remove('on');
  });
  document.getElementById('p'+t).classList.add('on');
  document.getElementById('t'+t).classList.add('on');
  // Only render if switching TO the tab (not already on it)
  if(t==='Sum' && !alreadyOn) renderSum();
  if(t==='Exp') renderExp();
}

// ── Data ──────────────────────────────────────────────────────────────────────

// ── Helpers ───────────────────────────────────────────────────────────────────
function nk(s){ return s.toLowerCase().replace(/\/co\/?/g,'/co').trim(); }
function bg(t){ return BG[nk(t)] || {m:0,h:0}; }
function mr(t){ return MR[nk(t)] || null; }
function qt(t){ return QT[nk(t)] || null; }
function effH(j){
  if(j.hrsOv !== undefined && j.hrsOv !== null) return j.hrsOv;
  var r = mr(j.task);
  var raw = r ? r.h * (j.meas||0) : bg(j.task).h;
  return Math.max(0.5, raw);
}
function effM(j){
  var r = mr(j.task);
  return r ? r.m * (j.meas||0) : bg(j.task).m;
}
function effMats(j){
  if(j.matsOv !== undefined && j.matsOv !== null) return j.matsOv;
  return MATS[nk(j.task)] || [];
}
function countJobs(){ return Object.keys(jobs).length; }
function updateBadge(){ document.getElementById('totalBadge').textContent = countJobs(); }

// ── Build scope tab ───────────────────────────────────────────────────────────
function buildScope(){
  var list = document.getElementById('scopeList');
  list.innerHTML = '';
  SECTIONS.forEach(function(sec){
    var card = document.createElement('div');
    card.className = 'sec-card';
    card.id = 'sc-' + sec.n;

    var hdr = document.createElement('div');
    hdr.className = 'sec-hdr';
    hdr.innerHTML = '<div class="sec-hdr-left"><span>' + sec.i + '</span><span>' + sec.n + '</span><span class="sec-bdg" id="sb-' + sec.n + '">0</span></div><span class="chevron">&#9654;</span>';
    hdr.addEventListener('click', function(){ card.classList.toggle('open'); });

    var body = document.createElement('div');
    body.className = 'sec-body';

    var sr = document.createElement('div');
    sr.className = 'room-srch';
    var si = document.createElement('input');
    si.type = 'text';
    si.placeholder = 'Filter ' + sec.n + '…';
    var nm = document.createElement('div');
    nm.className = 'no-match';
    nm.id = 'nm-' + sec.n;
    nm.textContent = 'No matching jobs';
    si.addEventListener('click', function(e){ e.stopPropagation(); });
    si.addEventListener('input', function(){
      var q = si.value.toLowerCase();
      var any = false;
      card.querySelectorAll('.task-row').forEach(function(r){
        var show = !q || r.getAttribute('data-task').toLowerCase().indexOf(q) !== -1;
        r.style.display = show ? '' : 'none';
        if(show) any = true;
      });
      nm.style.display = (!any && q) ? 'block' : 'none';
    });
    sr.appendChild(si);
    body.appendChild(sr);
    body.appendChild(nm);

    var seen = {};
    sec.t.forEach(function(task){
      if(seen[task]) return; seen[task] = true;
      var key = jKey(sec.n, task);
      var row = document.createElement('div');
      row.className = 'task-row';
      row.setAttribute('data-task', task);
      row.id = 'tr-' + key;
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = 'cb-' + key;
      if(jobs[key]) { cb.checked = true; row.classList.add('sel'); }
      cb.addEventListener('change', function(){ toggleJob(sec.n, task, cb, row); });
      var lbl = document.createElement('label');
      lbl.htmlFor = 'cb-' + key;
      lbl.textContent = task;
      row.appendChild(cb);
      row.appendChild(lbl);
      body.appendChild(row);
    });

    card.appendChild(hdr);
    card.appendChild(body);
    list.appendChild(card);
  });
}

function globalSearch(q){
  var lq = q.toLowerCase();
  SECTIONS.forEach(function(sec){
    var card = document.getElementById('sc-' + sec.n);
    if(!card) return;
    var any = false;
    card.querySelectorAll('.task-row').forEach(function(r){
      var show = !q || r.getAttribute('data-task').toLowerCase().indexOf(lq) !== -1;
      r.style.display = show ? '' : 'none';
      if(show) any = true;
    });
    card.style.display = any ? '' : 'none';
    if(q && any) card.classList.add('open');
    if(!q) card.style.display = '';
  });
}

function toggleJob(section, task, cb, row){
  var key = jKey(section, task);
  if(cb.checked){
    jobs[key] = {section:section, task:task, qty:1, meas:0, hrsOv:null, matsOv:null, notes:'', photos:[]};
    row.classList.add('sel');
  } else {
    delete jobs[key];
    row.classList.remove('sel');
  }
  var bdg = document.getElementById('sb-' + section);
  if(bdg){
    var cnt = 0;
    Object.keys(jobs).forEach(function(k){ if(jobs[k].section === section) cnt++; });
    bdg.textContent = cnt;
    bdg.className = cnt > 0 ? 'sec-bdg on' : 'sec-bdg';
  }
  updateBadge();
  save();
}

function clearAll(){
  if(!confirm('Clear all selected jobs?')) return;
  jobs = {};
  buildScope();
  updateBadge();
  renderSum();
  renderExp();
}

function renderSum(){

  Object.keys(bySec).forEach(function(sec){

        var mi=document.createElement('input'); mi.type='number'; mi.min='0'; mi.step='1'; mi.className='finput'; mi.value=j.meas||0;
        mi.addEventListener('input', function(){ jobs[key].meas=parseFloat(mi.value)||0; save(); updateJobCost(key); });
        var mu=document.createElement('span'); mu.className='munit'; mu.textContent=mtype==='sqft'?'sq ft':'ln ft';
        mrow.appendChild(mi); mrow.appendChild(mu); frow.appendChild(mrow);
      } else {
        var qw=document.createElement('div'); qw.style.cssText='display:flex;align-items:center;gap:8px';
        var qm=document.createElement('button'); qm.type='button'; qm.textContent='-'; qm.style.cssText='width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:var(--bg);font-size:18px;cursor:pointer';
        var qv=document.createElement('span'); qv.textContent=j.qty; qv.id='qv-'+key; qv.style.cssText='min-width:28px;text-align:center;font-weight:700';
        var qp=document.createElement('button'); qp.type='button'; qp.textContent='+'; qp.style.cssText='width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:var(--bg);font-size:18px;cursor:pointer';

      }
      body.appendChild(frow);

      // Hours

      var acts=document.createElement('div'); acts.className='mat-acts';
      var sv=document.createElement('button'); sv.type='button'; sv.className='btn-sv'; sv.textContent='Save';
      var cn=document.createElement('button'); cn.type='button'; cn.className='btn-cn'; cn.textContent='Cancel';
      var rs=document.createElement('button'); rs.type='button'; rs.className='btn-rs'; rs.textContent='Reset to default';

      sv.addEventListener('click', function(){ jobs[key].matsOv=eta.value.split('\n').map(function(s){return s.trim();}).filter(Boolean); renderSum(); });

      // Photos

      var pbtns=document.createElement('div'); pbtns.className='photo-btns';

// ── Property / Scope Management ───────────────────────────────────────────────
// Data model:
//   localStorage: 'sfProps'       -> [{id, name, created}]  (address book)
//   localStorage: 'sfScopes'      -> [{id, name, addr, created, updated}]  (scope list)  
//   localStorage: 'sfActiveScope' -> scope id
//   localStorage: 'sfJobs_<id>'   -> jobs JSON for that scope
//   localStorage: 'sfForm_<id>'   -> {addr,prep,notes,date} for that scope

var activeScope = null;  // current scope object {id, name, addr, ...}

function genId() {
  return 'sc' + Date.now() + Math.random().toString(36).substr(2,5);
}

function getScopes() {
  try { return JSON.parse(localStorage.getItem('sfScopes') || '[]'); } catch(e){ return []; }
}
function saveScopes(scopes) {
  try { localStorage.setItem('sfScopes', JSON.stringify(scopes)); } catch(e){}
}

function getProps() {
  try { return JSON.parse(localStorage.getItem('sfProps') || '[]'); } catch(e){ return []; }
}
function saveProps(props) {
  try { localStorage.setItem('sfProps', JSON.stringify(props)); } catch(e){}
}

function loadScope(scope) {
  activeScope = scope;
  jobs = {};
  try {
    var d = localStorage.getItem('sfJobs_' + scope.id);
    if(d) {
      var parsed = JSON.parse(d);
      Object.keys(parsed).forEach(function(k) { parsed[k].photos=[]; jobs[k]=parsed[k]; });
    }
    // Load form fields
    var form = JSON.parse(localStorage.getItem('sfForm_' + scope.id) || '{}');
    document.getElementById('xAddr').value = form.addr || scope.addr || '';
    document.getElementById('xPrep').value = form.prep || '';
    document.getElementById('xNotes').value = form.notes || '';
    document.getElementById('xDate').value = form.date || new Date().toISOString().slice(0,10);
    var r = localStorage.getItem('sfRate');
    if(r) { RATE = parseFloat(r); document.getElementById('rateIn').value = RATE; }
  } catch(e) {}
  // Update header
  document.getElementById('hdrScopeName').textContent = scope.addr || scope.name || 'Unnamed Property';
  localStorage.setItem('sfActiveScope', scope.id);
  updateBadge();
  buildScope();
  SECTIONS.forEach(function(s){ updateSectionBadge(s.n); });
  renderSum();
}


var _saveTimer = null;
function debounceSave(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function(){ save(); }, 800);
}

function save() {
  if(!activeScope) return;
  try {
    var slim = {};
    Object.keys(jobs).forEach(function(k) {
      var j = jobs[k];
      slim[k] = {section:j.section,task:j.task,qty:j.qty,meas:j.meas,hrsOv:j.hrsOv,matsOv:j.matsOv,notes:j.notes,photos:[]};
    });
    localStorage.setItem('sfJobs_' + activeScope.id, JSON.stringify(slim));
    localStorage.setItem('sfRate', RATE);
    // Update scope metadata
    var scopes = getScopes();
    for(var i=0; i<scopes.length; i++) {
      if(scopes[i].id === activeScope.id) {
        scopes[i].updated = Date.now();
        scopes[i].jobCount = Object.keys(jobs).length;
        break;
      }
    }
    saveScopes(scopes);
  } catch(e) {}
}

function saveForm() {
  if(!activeScope) return;
  try {
    localStorage.setItem('sfForm_' + activeScope.id, JSON.stringify({
      addr: document.getElementById('xAddr').value,
      prep: document.getElementById('xPrep').value,
      notes: document.getElementById('xNotes').value,
      date: document.getElementById('xDate').value
    }));
    // Also save address to props library
    var addr = document.getElementById('xAddr').value.trim();
    if(addr) {
      var props = getProps();
      var exists = props.some(function(p){ return p.addr === addr; });
      if(!exists) { props.unshift({addr:addr,id:genId()}); if(props.length>20) props.pop(); saveProps(props); }
    }
  } catch(e) {}
}

function load() {
  // On startup: find active scope or create default
  var scopes = getScopes();
  var activeId = localStorage.getItem('sfActiveScope');
  var found = null;
  if(activeId) { scopes.forEach(function(s){ if(s.id===activeId) found=s; }); }
  if(!found && scopes.length > 0) found = scopes[0];
  if(!found) {
    // Create a default scope
    found = {id:genId(), name:'New Property', addr:'', created:Date.now(), updated:Date.now(), jobCount:0};
    scopes.push(found);
    saveScopes(scopes);
  }
  loadScope(found);
}

// ── Property Modal ────────────────────────────────────────────────────────────
function openPropModal() {
  renderPropList();
  document.getElementById('propModal').classList.add('on');
  document.getElementById('newPropForm').style.display = 'none';
  document.getElementById('newPropBtn').style.display = 'flex';
}

function closePropModal() {
  document.getElementById('propModal').classList.remove('on');
}

function renderPropList() {
  var list = document.getElementById('propList');
  list.innerHTML = '';
  var scopes = getScopes();
  if(scopes.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">No properties yet. Create one below.</div>';
    return;
  }
  // Sort by updated desc
  scopes.sort(function(a,b){ return (b.updated||0)-(a.updated||0); });
  scopes.forEach(function(scope) {
    var item = document.createElement('div');
    item.className = 'prop-item' + (activeScope && activeScope.id===scope.id ? ' active' : '');
    var info = document.createElement('div'); info.className='prop-item-info';
    var name = document.createElement('div'); name.className='prop-item-name';
    name.textContent = scope.addr || scope.name || 'Unnamed Property';
    var meta = document.createElement('div'); meta.className='prop-item-meta';
    var d = new Date(scope.updated||scope.created||Date.now());
    meta.textContent = (scope.jobCount||0) + ' jobs · ' + d.toLocaleDateString();
    info.appendChild(name); info.appendChild(meta);
    var del = document.createElement('button'); del.type='button'; del.className='prop-item-del'; del.innerHTML='&#128465;';
    del.addEventListener('click', function(e) {
      e.stopPropagation();
      if(confirm('Delete this property and all its jobs?')) {
        deleteScope(scope.id);
      }
    });
    item.appendChild(info); item.appendChild(del);
    item.addEventListener('click', function() {
      loadScope(scope);
      closePropModal();
      goTab('Scope');
      toast('Loaded: ' + (scope.addr || scope.name));
    });
    list.appendChild(item);
  });
}

function showNewPropForm() {
  document.getElementById('newPropForm').style.display = 'block';
  document.getElementById('newPropBtn').style.display = 'none';
  document.getElementById('newPropName').value = '';
  document.getElementById('addrSuggestions').style.display = 'none';
  setTimeout(function(){ document.getElementById('newPropName').focus(); }, 100);
}

function hideNewPropForm() {
  document.getElementById('newPropForm').style.display = 'none';
  document.getElementById('newPropBtn').style.display = 'flex';
  document.getElementById('addrSuggestions').style.display = 'none';
}

function showAddrSuggestions(val) {
  var sugBox = document.getElementById('addrSuggestions');
  var props = getProps();
  if(!val || props.length===0) { sugBox.style.display='none'; return; }
  var lv = val.toLowerCase();
  var matches = props.filter(function(p){ return p.addr.toLowerCase().indexOf(lv)!==-1; }).slice(0,5);
  if(matches.length===0) { sugBox.style.display='none'; return; }
  sugBox.innerHTML = '';
  matches.forEach(function(p) {
    var item = document.createElement('div'); item.className='addr-sug-item';
    item.textContent = p.addr;
    item.addEventListener('click', function() {
      document.getElementById('newPropName').value = p.addr;
      sugBox.style.display = 'none';
    });
    sugBox.appendChild(item);
  });
  sugBox.style.display = 'block';
}

function createProperty() {
  var name = document.getElementById('newPropName').value.trim();
  if(!name) { document.getElementById('newPropName').focus(); return; }
  var scope = {id:genId(), name:name, addr:name, created:Date.now(), updated:Date.now(), jobCount:0};
  var scopes = getScopes();
  scopes.unshift(scope);
  saveScopes(scopes);
  // Save to address book
  var props = getProps();
  if(!props.some(function(p){ return p.addr===name; })) {
    props.unshift({addr:name,id:genId()});
    if(props.length>20) props.pop();
    saveProps(props);
  }
  hideNewPropForm();
  loadScope(scope);
  closePropModal();
  toast('Created: ' + name);
}

function deleteScope(id) {
  var scopes = getScopes().filter(function(s){ return s.id!==id; });
  saveScopes(scopes);
  try { localStorage.removeItem('sfJobs_'+id); localStorage.removeItem('sfForm_'+id); } catch(e){}
  // If deleting active scope, load another or create new
  if(activeScope && activeScope.id===id) {
    if(scopes.length>0) { loadScope(scopes[0]); }
    else {
      var ns = {id:genId(),name:'New Property',addr:'',created:Date.now(),updated:Date.now(),jobCount:0};
      scopes.push(ns); saveScopes(scopes); loadScope(ns);
    }
  }
  renderPropList();
}

// ── Share / Email ─────────────────────────────────────────────────────────────
function buildScopeText() {
  var keys = Object.keys(jobs);
  if(keys.length===0) return 'No jobs selected.';
  var tM=0, tH=0;
  keys.forEach(function(k){ var j=jobs[k]; tM+=effM(j)*j.qty; tH+=effH(j)*j.qty; });
  var tL=tH*RATE, tC=tM+tL;
  var addr = document.getElementById('xAddr').value || (activeScope ? activeScope.addr : '') || 'Unknown Property';
  var prep = document.getElementById('xPrep').value || '';
  var date = document.getElementById('xDate').value || new Date().toISOString().slice(0,10);
  var lines = [];
  lines.push('RENTAL TURN SCOPE — STONE FORTRESS STAFFING');
  lines.push('Property: ' + addr);
  if(prep) lines.push('Prepared by: ' + prep);
  lines.push('Date: ' + date);
  lines.push('');
  lines.push('BUDGET SUMMARY');
  lines.push('Total: ' + fmt$(tC));
  lines.push('Materials: ' + fmt$(tM));
  lines.push('Labor (' + tH.toFixed(2) + 'h @ $' + RATE + '/hr): ' + fmt$(tL));
  lines.push('');
  lines.push('JOBS (' + keys.length + ' total)');
  lines.push('---');
  var bySec = {};
  keys.forEach(function(k){ var j=jobs[k]; if(!bySec[j.section]) bySec[j.section]=[]; bySec[j.section].push(k); });
  Object.keys(bySec).forEach(function(sec) {
    lines.push('');
    lines.push(sec.toUpperCase());
    bySec[sec].forEach(function(key) {
      var j=jobs[key]; var h=effH(j)*j.qty, m=effM(j)*j.qty, l=h*RATE, tot=m+l;
      var qty = QT[nk(j.task)] ? (j.meas||0)+(QT[nk(j.task)]==='sqft'?' sq ft':' ln ft') : ('x'+j.qty);
      lines.push('  * ' + j.task + ' (' + qty + ') — ' + fmt$(tot) + ' [' + h.toFixed(2) + 'h / ' + fmt$(m) + ' mat]');
      if(j.notes) lines.push('    Note: ' + j.notes);
    });
  });
  var notes = document.getElementById('xNotes').value;
  if(notes) { lines.push(''); lines.push('NOTES'); lines.push(notes); }
  return lines.join('\n');
}

function nativeShare() {
  var text = buildScopeText();
  var addr = document.getElementById('xAddr').value || (activeScope ? activeScope.addr : 'Property');
  if(navigator.share) {
    navigator.share({
      title: 'Scope: ' + addr,
      text: text
    }).catch(function(){});
  } else {
    // Fallback: copy to clipboard
    try {
      navigator.clipboard.writeText(text).then(function(){ toast('Copied to clipboard!'); });
    } catch(e) { toast('Share not available on this browser'); }
  }
}

function emailScope() {
  var text = buildScopeText();
  var addr = document.getElementById('xAddr').value || (activeScope ? activeScope.addr : 'Property');
  var subject = encodeURIComponent('Turn Scope: ' + addr);
  var body = encodeURIComponent(text);
  window.location.href = 'mailto:?subject=' + subject + '&body=' + body;
}



// ── In-place cost update (no DOM rebuild) ─────────────────────────────────────
function updateJobCost(key){
  var j = jobs[key];
  if(!j) return;
  var h = effH(j) * j.qty;
  var m = effM(j) * j.qty;
  var l = h * RATE;
  var tot = m + l;
  // Update job card header costs
  var jt = document.getElementById('jt-' + key);
  var js = document.getElementById('js-' + key);
  if(jt) jt.textContent = fmt$(tot);
  if(js) js.textContent = h.toFixed(2) + 'h · ' + fmt$(m) + ' mat';
  // Update the qty display value inside the card
  var qv = document.getElementById('qv-' + key);
  if(qv) qv.textContent = j.qty;
  // Recalculate and update the top summary totals bar
  updateSummaryTotals();
}

function updateSummaryTotals(){
  var tM=0, tH=0;
  Object.keys(jobs).forEach(function(k){
    var j=jobs[k]; tM+=effM(j)*j.qty; tH+=effH(j)*j.qty;
  });
  var tL=tH*RATE, tC=tM+tL;
  var el_total = document.getElementById('sum-total');
  var el_mat   = document.getElementById('sum-mat');
  var el_labor = document.getElementById('sum-labor');
  if(el_total) el_total.textContent = fmt$(tC);
  if(el_mat)   el_mat.textContent   = fmt$(tM);
  if(el_labor) el_labor.textContent = fmt$(tL) + ' (' + tH.toFixed(1) + 'h)';
}

function smartPrint(){
  var keys = Object.keys(jobs);
  if(keys.length === 0){
    alert('No jobs selected. Check off jobs on the Scope tab first.');
    return;
  }

  // ── Build totals ─────────────────────────────────────────────────────────
  var tM=0, tH=0;
  keys.forEach(function(k){ var j=jobs[k]; tM+=effM(j)*j.qty; tH+=effH(j)*j.qty; });
  var tL=tH*RATE, tC=tM+tL;

  // ── Group by section ──────────────────────────────────────────────────────
  var bySec={};
  keys.forEach(function(k){
    var j=jobs[k];
    if(!bySec[j.section]) bySec[j.section]=[];
    bySec[j.section].push(k);
  });

  // ── Property / date info ──────────────────────────────────────────────────
  var addr = document.getElementById('xAddr').value ||
             (activeScope ? (activeScope.addr||activeScope.name) : '') || '';
  var prep = document.getElementById('xPrep').value || '';
  var date = document.getElementById('xDate').value || new Date().toISOString().slice(0,10);

  // ── Build HTML ────────────────────────────────────────────────────────────
  var html = '';

  // Header
  html += '<div class="pv-header">';
  html += '<div class="pv-co">Stone Fortress Staffing, LLC &nbsp;\u00B7&nbsp; Rental Turn Scope</div>';
  html += '<div class="pv-title">' + (addr || 'Scope Summary') + '</div>';
  html += '<div class="pv-meta">';
  if(prep) html += 'Prepared by: ' + prep + '&nbsp;&nbsp;';
  html += 'Date: ' + date;
  html += '&nbsp;&nbsp;&nbsp;Labor rate: $' + RATE + '/hr';
  html += '</div>';
  html += '</div>';

  // Totals bar
  html += '<div class="pv-totals">';
  html += '<div class="pv-total-item"><div class="pv-total-lbl">Total Budget</div><div class="pv-total-val pv-blue">' + fmt$(tC) + '</div></div>';
  html += '<div class="pv-total-item"><div class="pv-total-lbl">Materials</div><div class="pv-total-val pv-amber">' + fmt$(tM) + '</div></div>';
  html += '<div class="pv-total-item"><div class="pv-total-lbl">Labor (' + tH.toFixed(2) + 'h)</div><div class="pv-total-val pv-green">' + fmt$(tL) + '</div></div>';
  html += '<div class="pv-total-item"><div class="pv-total-lbl">Jobs Selected</div><div class="pv-total-val">' + keys.length + '</div></div>';
  html += '</div>';

  // Jobs by section
  Object.keys(bySec).forEach(function(sec){
    html += '<div class="pv-section">' + sec + '</div>';

    bySec[sec].forEach(function(key){
      var j = jobs[key];
      var h = effH(j)*j.qty;
      var m = effM(j)*j.qty;
      var l = h*RATE;
      var tot = m+l;
      var mtype = QT[nk(j.task)];
      var qtyStr = mtype
        ? ((j.meas||0) + (mtype==='sqft' ? ' sq ft' : ' ln ft'))
        : ('x' + j.qty);

      html += '<div class="pv-job">';

      // Job header row
      html += '<div class="pv-job-hdr">';
      html += '<div><div class="pv-job-name">' + j.task + '</div>';
      html += '<div class="pv-job-room">' + sec + ' &nbsp;\u00B7&nbsp; ' + qtyStr + '</div></div>';
      html += '<div class="pv-job-costs">';
      html += '<div class="pv-job-total">' + fmt$(tot) + '</div>';
      html += '<div class="pv-job-sub">' + h.toFixed(2) + 'h labor &nbsp;\u00B7&nbsp; ' + fmt$(m) + ' mat</div>';
      html += '</div>';
      html += '</div>';

      // Materials list
      var mats = effMats(j);
      if(mats && mats.length > 0){
        html += '<div class="pv-job-body">';
        html += '<div class="pv-mats-lbl">Materials</div>';
        mats.forEach(function(mat){
          html += '<div class="pv-mat">' + mat + '</div>';
        });
        html += '</div>';
      }

      html += '</div>'; // end pv-job
    });
  });

  // Footer
  html += '<div class="pv-footer">Stone Fortress Staffing, LLC &nbsp;\u00B7&nbsp; Rental Turn Scope Creator v8 &nbsp;\u00B7&nbsp; Confidential \u2014 Internal Use Only</div>';

  // ── Inject and print ──────────────────────────────────────────────────────
  document.getElementById('printView').innerHTML = html;
  setTimeout(function(){ window.print(); }, 100);
}

try { document.getElementById('xDate').value=new Date().toISOString().slice(0,10); } catch(e){}
load();

document.getElementById('xAddr').addEventListener('input', saveForm);
document.getElementById('xPrep').addEventListener('input', saveForm);
document.getElementById('xNotes').addEventListener('input', saveForm);
document.getElementById('xDate').addEventListener('input', saveForm);

// Close modal on overlay click
document.getElementById('propModal').addEventListener('click', function(e) {
  if(e.target === this) closePropModal();
});
</script>
